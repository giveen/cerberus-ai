name: Benchmarks

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 0' # weekly on Sunday 06:00 UTC
  push:
    branches:
      - main
    paths:
      - 'benchmarks/**'
      - '.github/workflows/benchmarks.yml'
      - 'src/cai/rag/**'

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest
    concurrency:
      group: 'benchmarks'
      cancel-in-progress: true
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install minimal tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run LongMemEval harness
        env:
          PYTHONPATH: ./src
        run: |
          # Use modest defaults in CI; override via workflow_dispatch inputs if needed
          python benchmarks/longmem_eval.py --num-docs 200 --num-topics 20 --vector-dim 64 --top-ks 1 3 5 --out results.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: longmem-benchmark-results
          path: results.json
