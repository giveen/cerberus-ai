name: Embeddings tests

on:
  push:
    paths:
      - 'src/cerberus/rag/**'
      - 'tests/**'
      - '.github/workflows/embeddings-tests.yml'
  pull_request:
    paths:
      - 'src/cerberus/rag/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run embeddings tests
        env:
          PYTHONPATH: ./src
        run: |
          pytest -q tests/test_embeddings.py
