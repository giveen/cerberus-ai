services:
  cerberus-dashboard:
    build:
      context: ..
      dockerfile: dockerized/Dockerfile
      target: frontend
    container_name: cerberus-dashboard
    env_file:
      - ../.env
      - ./.env/dashboard.env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./volumes/workspaces:/workspace/workspaces
      - ./volumes/logs:/workspace/logs
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  cerberus:
    build:
      context: ..
      dockerfile: dockerized/Dockerfile
      target: runtime
    container_name: cerberus
    profiles:
      - runtime
    env_file:
      - ../.env
      - ./.env/runtime.env
    volumes:
      - ./config:/config:ro
      - ./volumes/workspaces:/workspace/workspaces
      - ./volumes/logs:/workspace/logs
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    stdin_open: true
    tty: true
    depends_on:
      cerberus-dashboard:
        condition: service_started
      qdrant:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: cerberus-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cerberus-qdrant
    profiles:
      - runtime
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    restart: unless-stopped