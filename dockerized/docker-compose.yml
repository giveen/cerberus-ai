services:
  cerberus-dashboard:
    build:
      context: ..
      dockerfile: dockerized/Dockerfile
      target: frontend
    container_name: cerberus-dashboard
    env_file:
      - ../.env
      - ./.env/dashboard.env
    environment:
      PYTHONUNBUFFERED: "1"
      SEARXNG_BASE_URL: "http://cerberus-tools-hub:8080"
      CERBERUS_CONTAINER_MCP_URL: "http://cerberus-tools-hub:8000/sse"
      CERBERUS_PRICE_LIMIT: "100"
      CEREBRO_PRICE_LIMIT: "100"
    volumes:
      - ./volumes/workspaces:/workspace/workspaces
      - ./volumes/logs:/workspace/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      cerberus-tools-hub:
        condition: service_started
    networks:
      - cerberus-bridge
    stop_grace_period: 30s
    restart: "no"

  cerberus-tools-hub:
    build:
      context: ..
      dockerfile: dockerized/Dockerfile.tools_hub
    container_name: cerberus-tools-hub
    privileged: true
    volumes:
      - ./volumes/inner_docker:/var/lib/docker
      - ./volumes/workspaces:/workspace/workspaces
      - ./internal-tools.yml:/workspace/dockerized/internal-tools.yml:ro
      - ./searxng:/workspace/dockerized/searxng:ro
    networks:
      - cerberus-bridge
    ports:
      - "8500:8080"
      - "19000:8000"
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: cerberus-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    networks:
      - cerberus-bridge
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    stop_grace_period: 60s
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cerberus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    networks:
      - cerberus-bridge
    stop_grace_period: 45s
    restart: "no"

networks:
  cerberus-bridge:
    driver: bridge
