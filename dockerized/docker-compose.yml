services:
  cerberus-dashboard:
    build:
      context: ..
      dockerfile: dockerized/Dockerfile
      target: frontend
    container_name: cerberus-dashboard
    env_file:
      - ../.env
      - ./.env/dashboard.env
    environment:
      PYTHONUNBUFFERED: "1"
      SEARXNG_BASE_URL: "http://searxng:8080"
      CERBERUS_PRICE_LIMIT: "100"
      CEREBRO_PRICE_LIMIT: "100"
    volumes:
      - ./volumes/workspaces:/workspace/workspaces
      - ./volumes/logs:/workspace/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - cerberus-bridge
    stop_grace_period: 30s
    restart: "no"

  cerberus:
    build:
      context: ..
      dockerfile: dockerized/Dockerfile
      target: runtime
    container_name: cerberus
    profiles:
      - runtime
    env_file:
      - ../.env
      - ./.env/runtime.env
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080"
      QDRANT_URL: "http://qdrant:6333"
      CERBERUS_PRICE_LIMIT: "100"
      CEREBRO_PRICE_LIMIT: "100"
    volumes:
      - ./config:/config:ro
      - ./volumes/workspaces:/workspace/workspaces
      - ./volumes/logs:/workspace/logs
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - cerberus-bridge
    stdin_open: true
    tty: true
    pids_limit: 100
    depends_on:
      cerberus-dashboard:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "command -v cerberus >/dev/null && test -d \"${CERBERUS_WORKSPACE_ROOT:-/workspace/workspaces}\" && kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 45s
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5

  redis:
    image: redis:alpine
    container_name: cerberus-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    networks:
      - cerberus-bridge
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    stop_grace_period: 60s
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cerberus-qdrant
    profiles:
      - runtime
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    networks:
      - cerberus-bridge
    stop_grace_period: 45s
    restart: "no"

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: cerberus-searxng
    env_file:
      - ./.env/searxng.env
    ports:
      - "8500:8080"
    volumes:
      - ./searxng/core-config:/etc/searxng
      - ./volumes/searxng-cache:/var/cache/searxng
    networks:
      - cerberus-bridge
    depends_on:
      valkey:
        condition: service_started
    stop_grace_period: 30s
    restart: "no"

  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: cerberus-searxng-valkey
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - ./volumes/searxng-valkey:/data
    networks:
      - cerberus-bridge
    stop_grace_period: 30s
    restart: "no"

networks:
  cerberus-bridge:
    driver: bridge