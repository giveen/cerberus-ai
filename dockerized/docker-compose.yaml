services:
  cai:
    build:
      context: ..
      dockerfile: dockerized/Dockerfile
    container_name: cai
    # Host networking is required for current VPN/HTB tooling behavior.
    # In host mode, Docker does not use `ports:` mappings; services bind
    # directly on the host network namespace.
    network_mode: host
    privileged: true
    
    # VPN Capabilities (Crucial for the HTB Refactor)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun

    volumes:
      - ./config:/config:ro
      - ./logs:/opt/cai/logs
      - ./workspaces:/workspace # Bind mount for Principal and other HTB states
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CEREBRO_API_KEY=${CEREBRO_API_KEY}
      - ALIAS_API_KEY=${ALIAS_API_KEY}
      - CEREBRO_API_BASE=${CEREBRO_API_BASE:-http://host.docker.internal:8000/v1}
      - CEREBRO_MODEL=${CEREBRO_MODEL}
      - CEREBRO_SUPPORT_MODEL=${CEREBRO_SUPPORT_MODEL}
      - CAI_MODEL=${CAI_MODEL}
      - QDRANT_HOST=localhost # Since network_mode is host
    
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cai-qdrant
    network_mode: host # Matches CAI for easy local communication
    volumes:
      - ./qdrant_data:/qdrant/storage # Keeps your vector memory alive
    restart: unless-stopped