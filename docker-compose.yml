services:
  cai-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - ./workspaces:/app/workspaces:rw
      - ./src:/app/src
      - ./app:/app/app
      - ./rxconfig.py:/app/rxconfig.py
    environment:
      REDIS_URL: redis://redis:6379
      API_URL: http://localhost:8000
      CEREBRO_WORKSPACE_ROOT: /app/workspaces
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10